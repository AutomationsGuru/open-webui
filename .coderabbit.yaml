# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: "Be direct, concise, and implementation-focused. Prioritize correctness, security, missing validation, operational risk, and maintainability over style-only feedback."

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: false
  poem: false
  in_progress_fortune: false
  abort_on_close: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "master"
      - "develop"
      - "release/.*"
      - "hotfix/.*"
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 2
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
      - "DO NOT MERGE"
    labels:
      - "!do-not-review"
    ignore_usernames: []
  tools:
    github-checks:
      enabled: true
      timeout_ms: 900000
  path_instructions:
    - path: ".github/**"
      instructions: "Review workflows for least privilege, safe pull_request_target usage, branch-protection compatibility, and no execution of untrusted PR code with write tokens."
    - path: ".coderabbit.yaml"
      instructions: "Review CodeRabbit bot-review policy for drift from Agent OS GitHub-native tooling policy."
    - path: "AGENTS.md"
      instructions: "Treat this as a binding operational contract. Flag rules that weaken parent contracts, contradict standards, or create ambiguous authority."

chat:
  auto_reply: true
  art: false
